<div class="card bg-base-100 shadow-sm border border-base-200">
  <div class="card-body p-6">

    <!-- Header / toggle -->
    <div class="flex items-center justify-between cursor-pointer select-none" (click)="toggle()">
      <h3 class="text-sm font-semibold text-base-content/50 uppercase tracking-widest">QR Code Παγίου</h3>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
           stroke="currentColor" class="size-4 text-base-content/40 transition-transform duration-200"
           [class.rotate-180]="isOpen()">
        <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
      </svg>
    </div>

    @if (isOpen()) {
      <div class="mt-4 flex flex-col items-center gap-4">

        @if (error()) {
          <div role="alert" class="alert alert-error py-2 text-sm w-full">
            <span>{{ error() }}</span>
          </div>
        }

        @if (qrDataUrl()) {
          <!-- QR image -->
          <div class="p-3 bg-white rounded-2xl shadow-sm border border-base-200 inline-block">
            <img [src]="qrDataUrl()" width="240" height="240" [alt]="'QR code για ' + assetName"
                 class="block" />
          </div>

          <p class="text-xs text-base-content/40 text-center max-w-xs break-all">{{ qrContent }}</p>

          <!-- Actions -->
          <div class="flex gap-2 flex-wrap justify-center">
            <button type="button" class="btn btn-sm btn-outline gap-2" (click)="download()">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                   stroke-width="1.5" stroke="currentColor" class="size-4">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
              </svg>
              Λήψη PNG
            </button>
            <button type="button" class="btn btn-sm btn-outline gap-2" (click)="print()">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                   stroke-width="1.5" stroke="currentColor" class="size-4">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0 1 10.56 0m-10.56 0L6.34 18m10.94-4.171c.24.03.48.062.72.096m-.72-.096L17.66 18m0 0 .229 2.523a1.125 1.125 0 0 1-1.12 1.227H7.231c-.662 0-1.18-.568-1.12-1.227L6.34 18m11.318 0h1.091A2.25 2.25 0 0 0 21 15.75V9.456c0-1.081-.768-2.015-1.837-2.175a48.055 48.055 0 0 0-1.913-.247M6.34 18H5.25A2.25 2.25 0 0 1 3 15.75V9.456c0-1.081.768-2.015 1.837-2.175a48.041 48.041 0 0 1 1.913-.247m10.5 0a48.536 48.536 0 0 0-10.5 0m10.5 0V3.375c0-.621-.504-1.125-1.125-1.125h-8.25c-.621 0-1.125.504-1.125 1.125v3.659M18 10.5h.008v.008H18V10.5Zm-3 0h.008v.008H15V10.5Z" />
              </svg>
              Εκτύπωση
            </button>
          </div>
        } @else {
          <div class="flex justify-center py-4">
            <span class="loading loading-spinner loading-md text-primary"></span>
          </div>
        }
      </div>
    }

  </div>
</div>
